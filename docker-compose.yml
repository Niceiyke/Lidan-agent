# ============================================
# Agentic OS - Production Docker Compose
# ============================================
# Production deployment with Traefik on Edge network

services:
  # ============================================
  # Traefik - Reverse Proxy (on Edge Network)
  # ============================================
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    networks:
      - edge  # External edge network
    command:
      # Traefik configuration
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=agentic-network"
      # Let's Encrypt for HTTPS
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      # Edge compatible settings
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redirect HTTP to HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    labels:
      - "traefik.enable=true"

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: agentic-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentic_dev}
      POSTGRES_DB: agentic_os
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agentic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic -d agentic_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis Cache & Message Queue
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: agentic-redis
    restart: unless-stopped
    env_file:
      - .env
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - agentic-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Agentic OS API Server
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: agentic-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Database
      DATABASE_URL: ${DATABASE_URL}
      # Redis
      REDIS_URL: ${REDIS_URL}
      # API Configuration
      PORT: ${PORT:-3001}
      NODE_ENV: production
      # CORS
      CORS_ORIGIN: "https://lidan.wordlyte.com"
      # Workspaces
      WORKSPACES_PATH: /workspaces
      # AI Provider
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # Optional: Additional config
      AGENTIC_API_URL: https://lidan-api.wordlyte.com
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - workspaces:/workspaces
      - /var/run/docker.sock:/var/run/docker.sock  # For Docker-in-Docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agentic-network
      - edge  # Connect to edge network for Traefik routing
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      # Traefik routing for API
      - "traefik.enable=true"
      - "traefik.docker.network=agentic-network"
      - "traefik.http.routers.agentic-api.rule=Host(`lidan-api.wordlyte.com`)"
      - "traefik.http.routers.agentic-api.entrypoints=websecure"
      - "traefik.http.routers.agentic-api.tls=true"
      - "traefik.http.routers.agentic-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.agentic-api.service=agentic-api-service"
      - "traefik.http.services.agentic-api-service.loadbalancer.server.port=3001"

  # ============================================
  # Agentic OS Web Dashboard
  # ============================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    container_name: agentic-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Next.js public URL
      NEXT_PUBLIC_API_URL: https://lidan-api.wordlyte.com
      NEXT_PUBLIC_WS_URL: wss://lidan-api.wordlyte.com
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - agentic-network
      - edge  # Connect to edge network for Traefik routing
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      # Traefik routing for Web
      - "traefik.enable=true"
      - "traefik.docker.network=agentic-network"
      - "traefik.http.routers.agentic-web.rule=Host(`lidan.wordlyte.com`)"
      - "traefik.http.routers.agentic-web.entrypoints=websecure"
      - "traefik.http.routers.agentic-web.tls=true"
      - "traefik.http.routers.agentic-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.agentic-web.service=agentic-web-service"
      - "traefik.http.services.agentic-web-service.loadbalancer.server.port=3000"

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
  redis_data:
  workspaces:
  traefik_certs:

# ============================================
# Networks
# ============================================
networks:
  # Internal network for services
  agentic-network:
    driver: bridge
    name: agentic-network
  
  # External edge network
  edge:
    external: true
    name: edge